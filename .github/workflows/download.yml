name: Download Moodle PDF

on:
  schedule:
    # Runs every Sun, Mon, Tue, Wed, Thu at 18:30 UTC
    # = 19:30 Berlin time (CET/UTC+1); note: 20:30 during CEST (UTC+2, late Mar–late Oct)
    - cron: '30 18 * * 0,1,2,3,4'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run download script
        env:
          MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
          MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
          PDF_URL: https://moodle.humboldtgym.de/mod/resource/view.php?id=5823
        run: npm run download

      - name: Commit and push downloaded file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "chore: add downloaded PDF [$(date -u '+%Y-%m-%d')]"
            git push
          fi